<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản Lý Đơn Hàng - Trám Đen Hoàng Vân</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep:  #1a4a1f;
      --green-mid:   #2e7d32;
      --cream:       #fdf8f0;
      --white:       #ffffff;
      --text-dark:   #1c2a1e;
      --text-mid:    #3d5a40;
      --gold-dark:   #d4a005;
    }
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      padding: 40px 20px;
    }
    .admin-container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(30,80,30,0.12);
      overflow: hidden;
    }
    .admin-header {
      background: var(--green-deep);
      color: var(--white);
      padding: 24px 30px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .admin-header h1 { font-size: 1.5rem; }
    .back-btn {
      color: var(--white); text-decoration: none; font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 6px;
      transition: background 0.2s; display: inline-block;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    
    .export-btn {
      background: var(--gold-dark); color: var(--white); border: none;
      padding: 9px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s; margin-right: 12px;
    }
    .export-btn:hover { opacity: 0.85; }
    
    .order-table-container { width: 100%; overflow-x: auto; min-height: 400px;}
    .order-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 900px; }
    .order-table th, .order-table td { padding: 16px 20px; text-align: left; border-bottom: 1px solid #e0e0e0; }
    .order-table th { background: #f5f5f5; font-weight: 700; position: sticky; top: 0; z-index: 1; white-space: nowrap;}
    .order-table tr:hover td { background: rgba(118,196,66,0.05); }
    
    .status-badge {
      display: inline-block; padding: 6px 10px; border-radius: 6px; font-weight: 600; font-size: 0.8rem; white-space: nowrap;
    }
    .status-new { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .status-fake { background: #fff3e0; color: #ef6c00; border: 1px solid #ffe0b2; }
    
    .text-bold { font-weight: 700; color: var(--text-dark); }
    .text-gold { color: var(--gold-dark); font-weight: 700; }
    .empty-state { text-align: center; padding: 60px; color: var(--text-mid); }
  </style>
</head>
<body>

<div class="admin-container">
  <div class="admin-header">
    <h1>Quản Lý Đơn Hàng</h1>
    <div>
      <button class="export-btn" onclick="exportToExcel()">📥 Xuất Excel (CSV)</button>
      <a href="index.html" class="back-btn">← Quay lại trang chủ</a>
    </div>
  </div>
  <div class="order-table-container">
    <table class="order-table">
      <thead>
        <tr>
          <th>Ngày Đặt</th>
          <th>Khách Hàng</th>
          <th>SĐT</th>
          <th>Địa Chỉ Giao</th>
          <th>Sản Phẩm</th>
          <th>SL</th>
          <th>Tổng Tiền</th>
          <th>Trạng Thái</th>
        </tr>
      </thead>
      <tbody id="orderTableBody">
        <!-- Orders injected here -->
      </tbody>
    </table>
  </div>
</div>

<script>
  function renderAdminTable() {
    const tbody = document.getElementById('orderTableBody');
    const saved = localStorage.getItem('tramDenOrders');
    let allOrders = saved ? JSON.parse(saved) : [];
    
    if (allOrders.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Chưa có đơn hàng nào.<br><br><small>Nếu bạn xóa lịch sử web, dữ liệu sẽ bị mất vì đây là bản demo lưu cục bộ.</small></td></tr>';
      return;
    }
    
    allOrders.forEach(o => {
      const tr = document.createElement('tr');
      const badgeClass = o.isFake ? 'status-fake' : 'status-new';
      const badgeText = o.isFake ? 'Hệ thống (Mẫu)' : 'Mới đặt';
      
      tr.innerHTML = `
        <td>${o.date}</td>
        <td class="text-bold">${o.name}</td>
        <td>${o.phone}</td>
        <td>${o.address}</td>
        <td>${o.product}</td>
        <td style="text-align:center;font-weight:700;">${o.qty}</td>
        <td class="text-gold">${o.total.toLocaleString('vi-VN')}đ</td>
        <td><span class="status-badge ${badgeClass}">${badgeText}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Khởi chạy khi load trang
  renderAdminTable();

  // Tính năng xuất Excel (Tạo file CSV)
  function exportToExcel() {
    const saved = localStorage.getItem('tramDenOrders');
    let allOrders = saved ? JSON.parse(saved) : [];
    
    if (allOrders.length === 0) {
      alert("Không có đơn hàng nào để xuất!");
      return;
    }

    // JS trick để tạo BOM (Byte Order Mark), giúp Excel đọc được chữ tiếng Việt UTF-8
    let csvContent = "\uFEFF"; 
    
    // Tạo Header cho CSV
    csvContent += "Ngày Đặt,Khách Hàng,SĐT,Địa Chỉ Giao,Sản Phẩm,Số Lượng,Tổng Tiền,Trạng Thái\n";
    
    // Ghi từng dòng dữ liệu
    allOrders.forEach(o => {
      // Dọn dẹp thẻ html (<br/>) trong địa chỉ biến thành chuỗi text
      let cleanAddress = o.address.replace(/<[^>]*>?/gm, ' - ').replace(/"/g, '""');
      let cleanName = o.name.replace(/"/g, '""');
      let status = o.isFake ? "Hệ thống (Mẫu)" : "Mới đặt";
      
      let row = `"${o.date}","${cleanName}","${o.phone}","${cleanAddress}","${o.product}","${o.qty}","${o.total}","${status}"`;
      csvContent += row + "\n";
    });

    // Tạo file và cho phép tải xuống
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", "Danh_Sach_Don_Hang_Tram_Den.csv");
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
</script>

</body>
</html>
